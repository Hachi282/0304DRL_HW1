<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Gridworld (HW1)</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Load Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1 style="text-align: center;">GridWorld</h1>
            <div class="controls">
                <label for="grid-size">Enter a number between 5 and 9:</label>
                <input type="number" id="grid-size" min="5" max="9" value="5">
                <button id="generate-btn" class="primary-btn">Generate Square</button>
            </div>
            <div class="controls parameters">
                <div class="input-group">
                    <label for="gamma">Discount (γ):</label>
                    <input type="number" id="gamma" step="0.1" value="0.9" min="0" max="1">
                </div>
                <div class="input-group">
                    <label for="step-reward">Step Reward:</label>
                    <input type="number" id="step-reward" step="0.5" value="-1.0">
                </div>
                <div class="input-group">
                    <label for="goal-reward">Goal Reward:</label>
                    <input type="number" id="goal-reward" step="0.5" value="10.0">
                </div>
            </div>

            <div id="instructions" class="instructions">

                Click on a cell to set up the start grid as <span class="text-green">green</span> or the end grid as
                <span class="text-red">red</span>. Next, you may optionally select up to <span id="obs-count">3</span>
                obstacles (<span class="text-grey">grey</span>).
            </div>
        </header>

        <main>
            <div class="grid-section">
                <div id="interactive-grid" class="grid"></div>
                <div id="action-buttons" style="display: none; gap: 1rem; width: 100%; margin-top: 1rem;">
                    <button id="random-btn" class="primary-btn" style="flex: 1; background-color: #64748b;">Random Policy</button>
                    <button id="evaluate-btn" class="primary-btn" style="flex: 1;">Optimal Policy</button>
                </div>
            </div>

            <div id="results-section" class="results-section" style="display: none;">
                <div class="matrix-container">
                    <h3>Value Matrix</h3>
                    <div id="value-grid" class="grid static-grid"></div>
                </div>
                <div class="matrix-container">
                    <h3>Policy Matrix</h3>
                    <div id="policy-grid" class="grid static-grid"></div>
                </div>
            </div>
        </main>
        <footer style="text-align: right; font-size: 0.85rem; color: #94a3b8; margin-top: auto; padding-top: 2rem;">
            Hsin Yu Jou 7114029031
        </footer>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
